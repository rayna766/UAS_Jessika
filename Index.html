<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="container">
        <div id="form-container" class="card">
            <h2>Form Pendaftaran Mahasiswa Baru</h2>
            <form id="registration-form" novalidate>
                
                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" name="nim" placeholder="Masukkan NIM (Min. 8 digit angka)">
                    <span class="error-msg" id="error-nim"></span>
                </div>

                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap (Min. 5 karakter)">
                    <span class="error-msg" id="error-nama"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="contoh@domain.com">
                    <span class="error-msg" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="hp">Nomor HP</label>
                    <input type="text" id="hp" name="hp" placeholder="Masukkan Nomor HP (Min. 10 digit angka)">
                    <span class="error-msg" id="error-hp"></span>
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
                        <label><input type="radio" name="gender" value="Perempuan"> Perempuan</label>
                    </div>
                    <span class="error-msg" id="error-gender"></span>
                </div>

                <div class="form-group">
                    <label for="prodi">Program Studi</label>
                    <select id="prodi" name="prodi">
                        <option value="">-- Pilih Program Studi --</option>
                        <option value="Manajemen Informatika">Manajemen Informatika</option>
                        <option value="Teknik Informatika">Teknik Informatika</option>
                        <option value="Sistem Informasi">Sistem Informasi</option>
                        <option value="Komputerisasi Akuntansi">Komputerisasi Akuntansi</option>
                    </select>
                    <span class="error-msg" id="error-prodi"></span>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat</label>
                    <textarea id="alamat" name="alamat" rows="3" placeholder="Masukkan Alamat Lengkap (Min. 10 karakter)"></textarea>
                    <span class="error-msg" id="error-alamat"></span>
                </div>

                <div class="form-group">
                    <label for="pas-foto">Pas Foto</label>
                    <small style="color: #7c6a5a; display: block; margin-bottom: 5px; font-size: 12px;">
                        * Format: JPG, JPEG, atau PNG (Maksimal 2 MB)
                    </small>
                    <input type="file" id="pas-foto" name="pasFoto" accept=".jpg,.jpeg,.png">
                    <span class="error-msg" id="error-foto"></span>
                    
                    <div id="preview-container" style="display: none;">
                        <p>Preview Foto:</p>
                        <img id="image-preview" src="" alt="Preview Pas Foto">
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" id="btn-submit" class="btn btn-submit">Submit</button>
                    <button type="reset" id="btn-reset" class="btn btn-reset">Reset</button>
                </div>
            </form>
        </div>

        <div id="summary-container" class="card" style="display: none;">
            <h2>Kartu Hasil Pendaftaran</h2>
            <div class="summary-card">
                <div class="summary-photo">
                    <img id="result-foto" src="" alt="Foto Mahasiswa">
                </div>
                <div class="summary-details">
                    <p><span class="detail-label">NIM</span><span class="detail-separator">:</span><span id="result-nim" class="detail-value"></span></p>
                    <p><span class="detail-label">Nama Lengkap</span><span class="detail-separator">:</span><span id="result-nama" class="detail-value"></span></p>
                    <p><span class="detail-label">Email</span><span class="detail-separator">:</span><span id="result-email" class="detail-value"></span></p>
                    <p><span class="detail-label">Nomor HP</span><span class="detail-separator">:</span><span id="result-hp" class="detail-value"></span></p>
                    <p><span class="detail-label">Jenis Kelamin</span><span class="detail-separator">:</span><span id="result-gender" class="detail-value"></span></p>
                    <p><span class="detail-label">Program Studi</span><span class="detail-separator">:</span><span id="result-prodi" class="detail-value"></span></p>
                    <p><span class="detail-label">Alamat</span><span class="detail-separator">:</span><span id="result-alamat" class="detail-value"></span></p>
                </div>
            </div>
            <button type="button" id="btn-edit" class="btn btn-edit">Edit Data</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
